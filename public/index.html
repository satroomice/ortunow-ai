<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OrtuNow AI</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header class="hero">
        <h1>🌱 OrtuNow AI</h1>
        <p class="subtitle">Asisten parenting yang tenang dan responsif</p>
      </header>

      <main>
        <div id="chat-box" class="chat-box" aria-live="polite"></div>

        <form id="chat-form" class="chat-form">
          <label class="sr-only" for="user-input">Tulis pesan</label>
          <input
            type="text"
            id="user-input"
            placeholder="Tanyakan seputar parenting..."
            autocomplete="off"
            required
          />
          <button type="submit">Kirim</button>
        </form>
      </main>
    </div>
    <script src="script.js"></script>
  </body>
</html>
